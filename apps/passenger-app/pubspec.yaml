name: passenger_app
description: Atlas Ride Hailing - Passenger Application
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Presentation
  cupertino_icons: ^1.0.2
  google_maps_flutter: ^2.5.0
  flutter_bloc: ^8.1.3
  google_fonts: ^6.1.0
  
  # Networking & Real-time
  dio: ^5.3.3
  socket_io_client: ^2.0.3
  
  # Location & Permission
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  
  # Storage & Utilities
  flutter_secure_storage: ^9.0.0
  intl: ^0.18.1
  uuid: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
