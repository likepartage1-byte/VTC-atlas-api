server {
    listen 80;
    server_name magda-guide.com;

    # Basic logs for the First 24h Observation
    access_log /var/log/nginx/atlas_access.log;
    error_log /var/log/nginx/atlas_error.log;

    location / {
        proxy_pass http://localhost:3000;
        
        # 1. Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 2. WebSocket Support (Strict 1.1)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 3. Timeout Zero-Failure Policy
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 86400s; # Persistent connections for tracking
        
        # 4. Connection Stability
        proxy_buffering off; # Better for real-time streaming
        proxy_cache_bypass $http_upgrade;
    }
}
