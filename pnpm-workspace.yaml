packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@firebase/util': set this to true or false
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': set this to true or false
  '@sentry/node-cpu-profiler': set this to true or false
  esbuild: set this to true or false
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  unrs-resolver: true
